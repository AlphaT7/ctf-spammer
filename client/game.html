<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>CTF Spammer — Game</title>
        <link rel="icon" type="image/png" href="./images/favicon.png" />
        <link rel="stylesheet" href="./css/game.css" />
        <script type="module" src="./js/main.js"></script>
    </head>
    <body>
        <div id="bg-canvas"></div>
        <div id="game-root"></div>

        <div id="hud">
            <div class="hud-left">
                <span class="hud-item" id="hud-score">0000</span>
            </div>
            <div class="hud-center">
                <span class="hud-title">CTF Spammer</span>
            </div>
            <div class="hud-right">
                <span class="hud-item" id="hud-players">0</span>
            </div>
        </div>

        <div id="game-overlay">
            <div id="overlay-content"></div>
        </div>
    </body>
</html>
